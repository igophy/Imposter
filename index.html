<script>
(() => {
  const APP_VERSION = "1.0.0";
  const SW_PATH = "./sw.js";

  const STORAGE_KEYS = {
    installDismissed: "app_install_prompt_dismissed",
    updateDismissed: "app_update_prompt_dismissed_version",
    theme: "app_theme"
  };

  const isStandalone =
    window.matchMedia("(display-mode: standalone)").matches ||
    window.navigator.standalone === true;

  const isIOS =
    /iphone|ipad|ipod/i.test(window.navigator.userAgent);

  const isSafari =
    /^((?!chrome|android).)*safari/i.test(window.navigator.userAgent);

  function createAppMessage({ id, title, text, primaryText, secondaryText, onPrimary, onSecondary }) {
    if (document.getElementById(id)) return;

    const box = document.createElement("div");
    box.id = id;
    box.style.position = "fixed";
    box.style.left = "16px";
    box.style.right = "16px";
    box.style.bottom = "16px";
    box.style.zIndex = "9999";
    box.style.padding = "16px";
    box.style.borderRadius = "16px";
    box.style.background = "var(--app-card-bg, #ffffff)";
    box.style.color = "var(--app-text, #111111)";
    box.style.boxShadow = "0 8px 30px rgba(0,0,0,0.18)";
    box.style.border = "1px solid rgba(0,0,0,0.08)";
    box.style.maxWidth = "520px";
    box.style.margin = "0 auto";
    box.style.fontFamily = "system-ui, -apple-system, BlinkMacSystemFont, sans-serif";

    box.innerHTML = `
      <div style="font-weight:700;font-size:16px;margin-bottom:6px;">${title}</div>
      <div style="font-size:14px;line-height:1.4;margin-bottom:14px;">${text}</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;">
        ${
          secondaryText
            ? `<button data-secondary style="border:0;background:transparent;padding:10px 12px;font-weight:600;color:inherit;">${secondaryText}</button>`
            : ""
        }
        ${
          primaryText
            ? `<button data-primary style="border:0;border-radius:999px;background:var(--app-primary,#111);color:#fff;padding:10px 16px;font-weight:700;">${primaryText}</button>`
            : ""
        }
      </div>
    `;

    document.body.appendChild(box);

    const primary = box.querySelector("[data-primary]");
    const secondary = box.querySelector("[data-secondary]");

    if (primary) {
      primary.addEventListener("click", () => {
        if (onPrimary) onPrimary();
        box.remove();
      });
    }

    if (secondary) {
      secondary.addEventListener("click", () => {
        if (onSecondary) onSecondary();
        box.remove();
      });
    }
  }

  function applyTheme() {
    const savedTheme = localStorage.getItem(STORAGE_KEYS.theme) || "auto";
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

    const activeTheme =
      savedTheme === "auto"
        ? prefersDark ? "dark" : "light"
        : savedTheme;

    document.documentElement.dataset.theme = activeTheme;
    document.documentElement.dataset.themeSetting = savedTheme;
  }

  applyTheme();

  window
    .matchMedia("(prefers-color-scheme: dark)")
    .addEventListener("change", () => {
      const savedTheme = localStorage.getItem(STORAGE_KEYS.theme) || "auto";
      if (savedTheme === "auto") applyTheme();
    });

  window.appSettings = window.appSettings || {};
  window.appSettings.setTheme = function setTheme(theme) {
    if (!["light", "dark", "auto"].includes(theme)) return;
    localStorage.setItem(STORAGE_KEYS.theme, theme);
    applyTheme();
  };

  let deferredInstallPrompt = null;

  window.addEventListener("beforeinstallprompt", event => {
    event.preventDefault();
    deferredInstallPrompt = event;

    if (isStandalone) return;
    if (localStorage.getItem(STORAGE_KEYS.installDismissed) === "true") return;

    createAppMessage({
      id: "app-install-message",
      title: "Installer appen",
      text: "Du kan legge appen til på hjemskjermen for raskere tilgang.",
      primaryText: "Installer",
      secondaryText: "Ikke nå",
      onPrimary: async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
      },
      onSecondary: () => {
        localStorage.setItem(STORAGE_KEYS.installDismissed, "true");
      }
    });
  });

  window.addEventListener("load", () => {
    if (isStandalone) return;
    if (!isIOS || !isSafari) return;
    if (localStorage.getItem(STORAGE_KEYS.installDismissed) === "true") return;

    createAppMessage({
      id: "ios-install-message",
      title: "Legg til på Hjem-skjerm",
      text: "På iPhone kan du installere appen ved å trykke Del-knappen og velge «Legg til på Hjem-skjerm».",
      primaryText: "OK",
      secondaryText: "Ikke vis igjen",
      onSecondary: () => {
        localStorage.setItem(STORAGE_KEYS.installDismissed, "true");
      }
    });
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      try {
        const registration = await navigator.serviceWorker.register(SW_PATH);

        registration.addEventListener("updatefound", () => {
          const newWorker = registration.installing;
          if (!newWorker) return;

          newWorker.addEventListener("statechange", () => {
            if (
              newWorker.state === "installed" &&
              navigator.serviceWorker.controller &&
              localStorage.getItem(STORAGE_KEYS.updateDismissed) !== APP_VERSION
            ) {
              createAppMessage({
                id: "app-update-message",
                title: "Ny versjon tilgjengelig",
                text: "En oppdatert versjon av appen er klar.",
                primaryText: "Oppdater",
                secondaryText: "Senere",
                onPrimary: () => {
                  newWorker.postMessage({ type: "SKIP_WAITING" });
                },
                onSecondary: () => {
                  localStorage.setItem(STORAGE_KEYS.updateDismissed, APP_VERSION);
                }
              });
            }
          });
        });

        navigator.serviceWorker.addEventListener("controllerchange", () => {
          window.location.reload();
        });

        setInterval(() => {
          registration.update();
        }, 60 * 60 * 1000);
      } catch (error) {
        console.warn("Service worker kunne ikke registreres:", error);
      }
    });
  }
})();
</script>
